# Netlify = static hosting only; API runs elsewhere (e.g. Cloudflare Workers).
# Default: set VITE_API_BASE_URL to your Worker URL, then redeploy.
#
# Optional same-origin /api proxy (avoids browsers resolving *.workers.dev):
# [[redirects]]
#   from = "/api/*"
#   to = "https://game-collection-backend.sy-dev.workers.dev/api/:splat"
#   status = 200
#   force = true
# Then set VITE_API_BASE_URL to "" or your Netlify site URL and rebuild.

[build]
  # Install deps first (root + frontend); otherwise "vite: not found" because frontend/node_modules is missing
  command = "npm run install:all && npm run build:frontend"
  publish = "frontend/dist"

# SPA: serve index.html for all routes so React Router works when users open /games/bigtwo etc. directly
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
