# Render.com blueprint: one service runs Node (backend) and serves the built frontend.
# Deploy from repo root; Render runs "build" then "start" and keeps backend in same directory.

services:
  - type: web
    name: game-collection
    runtime: node
    region: oregon

    buildCommand: npm run install:all && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
